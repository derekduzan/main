.body-blur::before{content:"";position:fixed;inset:0;backdrop-filter:blur(var(--page-blur));-webkit-backdrop-filter:blur(var(--page-blur));pointer-events:none}
.preview{width:320px;max-width:100%;padding:24px;border-radius:24px;text-align:center;background:var(--card-bg);color:var(--text);position:relative;z-index:1;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
.preview.glass-card{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.28);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur))}
.logo{width:90px;height:90px;object-fit:cover;margin:0 auto 12px;display:block;filter:var(--photo-filter)}
.circle{border-radius:50%}
.rounded{border-radius:16px}
.square{border-radius:0}
.triangle{clip-path:polygon(50% 0%,0% 100%,100% 100%)}
h3{margin:0 0 8px;font-size:24px;line-height:1.1}
p{margin:0 0 14px;opacity:.9}
.btn{display:block;width:100%;padding:12px;margin:8px 0;border-radius:12px;text-decoration:none;font-weight:600;transition:transform .2s, box-shadow .2s, opacity .2s, background .2s, color .2s}
.btn.solid{background:var(--btn-bg);color:var(--btn-text);border:none}
.btn.outline{background:transparent;border:2px solid var(--btn-bg);color:var(--btn-bg)}
.btn.glass{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));color:var(--text)}
.btn.primary{background:var(--primary-bg);color:var(--primary-text);border:none}
.btn.primary.gradient{background:linear-gradient(135deg,var(--primary-bg),var(--primary-bg-2));color:var(--primary-text)}
.btn.primary.glass{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));color:var(--primary-text)}
.hover-lift:hover{transform:translateY(-3px)}
.hover-glow:hover{box-shadow:0 0 16px rgba(255,255,255,0.55)}
.hover-slide{overflow:hidden;position:relative}
.hover-slide span{display:inline-block;transition:transform .3s}
.hover-slide:hover span{transform:translateY(-4px)}
.cta-pulse{animation:ctaPulse 1.8s ease-in-out infinite}
.cta-color-shift{transition:background .2s, color .2s, box-shadow .2s}
.cta-color-shift:hover{background:var(--primary-hover-bg)!important;color:var(--primary-text)!important}
@keyframes ctaPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,0)}50%{transform:scale(1.02);box-shadow:0 0 0 10px rgba(255,255,255,0),0 0 24px rgba(255,255,255,.22)}}
.social-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:16px}
.social-icon{width:42px;height:42px;border-radius:999px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:rgba(255,255,255,0.16);color:var(--text);border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .2s, box-shadow .2s}
.social-icon:hover{transform:translateY(-2px)}
.social-icon svg{width:18px;height:18px;display:block;fill:currentColor}
</style>
</head>
